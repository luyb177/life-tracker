<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>邮箱验证码</title>
    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; color: #333; }
        .card { max-width: 600px; margin: 0 auto; border: 1px solid #eee; border-radius: 8px; padding: 24px; }
        .code { font-size: 28px; font-weight: bold; letter-spacing: 4px; background: #f6f6f6; padding: 12px 16px; border-radius: 6px; display: inline-block; }
        .footer { margin-top: 16px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
<div class="card">
    <h2>【Life Tracker】邮箱验证码</h2>
    <p>您好，您正在进行邮箱验证操作。</p>
    <p>验证码：</p>
    <div class="code">{{.Code}}</div>
    <p>有效期：{{.ExpireMinutes}} 分钟</p>
    <p>如果不是您本人操作，请忽略本邮件。</p>
    <div class="footer">
        <p>Silent Sign 团队</p>
        <p>发送时间：{{.Now}}</p>
    </div>
</div>
</body>
</html>
