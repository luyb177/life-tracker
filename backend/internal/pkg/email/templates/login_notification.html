<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>登录通知</title>
    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; color: #333; }
        .card { max-width: 600px; margin: 0 auto; border: 1px solid #eee; border-radius: 8px; padding: 24px; }
        .info { background: #f6f6f6; padding: 12px 16px; border-radius: 6px; margin: 16px 0; }
        .info p { margin: 6px 0; font-size: 14px; }
        .footer { margin-top: 24px; font-size: 12px; color: #999; border-top: 1px solid #eee; padding-top: 16px; }
        .warn { color: #e74c3c; font-size: 13px; margin-top: 16px; }
    </style>
</head>
<body>
<div class="card">
    <h2>【Life Tracker】登录通知</h2>
    <p>您好，<strong>{{.Username}}</strong></p>
    <p>您的账号刚刚进行了一次登录操作。</p>
    <div class="info">
        <p><strong>登录 IP：</strong>{{.IP}}</p>
        <p><strong>登录位置：</strong>{{.Location}}</p>
        <p><strong>登录时间：</strong>{{.Now}}</p>
    </div>
    <p class="warn">如果不是您本人操作，请立即修改密码或联系支持团队。</p>
    <div class="footer">
        <p>【Life Tracker】团队</p>
    </div>
</div>
</body>
</html>
