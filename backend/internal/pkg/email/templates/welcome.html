<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>欢迎加入</title>
    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; color: #333; }
        .card { max-width: 600px; margin: 0 auto; border: 1px solid #eee; border-radius: 8px; padding: 24px; }
        .username { font-size: 20px; font-weight: bold; color: #2c3e50; }
        .footer { margin-top: 24px; font-size: 12px; color: #999; border-top: 1px solid #eee; padding-top: 16px; }
    </style>
</head>
<body>
<div class="card">
    <h2>欢迎加入【Life Tracker】！</h2>
    <p>您好，<span class="username">{{.Username}}</span></p>
    <p>感谢您注册【Life Tracker】，您的账号已成功创建。</p>
    <p>您现在可以开始使用我们的服务了。如有任何问题，请随时联系我们的支持团队。</p>
    <div class="footer">
        <p>【Life Tracker】团队</p>
        <p>发送时间：{{.Now}}</p>
    </div>
</div>
</body>
</html>
