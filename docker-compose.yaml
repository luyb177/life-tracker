# ============================================================
# Life Tracker - Docker Compose
# ============================================================
# 前置准备:
#   1. 构建并推送镜像: ./build.sh
#   2. 配置 etc/life_tracker.yaml (MySQL, Redis, AI)
#   3. 放置 ip2region 数据文件到 data/
#
# 常用命令:
#   docker compose up -d                         # 启动全部服务
#   docker compose down                          # 停止
#   docker compose run --rm life-tracker-cron cron summary -t 1  # 手动日报
#   docker compose pull                           # 拉取最新镜像
# ============================================================

services:
  # ── nginx — 前端 + API 反向代理 ──
  nginx:
    image: crpi-u5azhs6neq326bz0.cn-hangzhou.personal.cr.aliyuncs.com/yub_lu/life-tracker-web:latest
    pull_policy: always
    platform: linux/amd64
    container_name: life-tracker-nginx
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - life-tracker
    networks:
      - app-net

  # ── 主 API 服务 ──
  life-tracker:
    image: crpi-u5azhs6neq326bz0.cn-hangzhou.personal.cr.aliyuncs.com/yub_lu/life-tracker:latest
    pull_policy: always
    platform: linux/amd64
    container_name: life-tracker
    expose:
      - "8888"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./etc/life_tracker.yaml:/app/etc/life_tracker.yaml:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    networks:
      - app-net

  # ── 定时调度器 ──
  life-tracker-scheduler:
    image: crpi-u5azhs6neq326bz0.cn-hangzhou.personal.cr.aliyuncs.com/yub_lu/life-tracker:latest
    pull_policy: always
    platform: linux/amd64
    container_name: life-tracker-scheduler
    environment:
      TZ: Asia/Shanghai
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 8 * * * cd /app && cron summary -t 1 --config etc/life_tracker.yaml"  > /etc/crontabs/root
        echo "0 8 * * 1 cd /app && cron summary -t 2 --config etc/life_tracker.yaml" >> /etc/crontabs/root
        echo "0 8 1 * * cd /app && cron summary -t 3 --config etc/life_tracker.yaml" >> /etc/crontabs/root
        echo "0 8 1 1 * cd /app && cron summary -t 4 --config etc/life_tracker.yaml" >> /etc/crontabs/root
        exec crond -f -l 2
    volumes:
      - ./etc/life_tracker.yaml:/app/etc/life_tracker.yaml:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    networks:
      - app-net

  # ── 手动定时任务 ──
  life-tracker-cron:
    image: crpi-u5azhs6neq326bz0.cn-hangzhou.personal.cr.aliyuncs.com/yub_lu/life-tracker:latest
    pull_policy: always
    platform: linux/amd64
    container_name: life-tracker-cron
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./etc/life_tracker.yaml:/app/etc/life_tracker.yaml:ro
      - ./data:/app/data:ro
    networks:
      - app-net
    profiles:
      - cron

networks:
  app-net:
    driver: bridge
